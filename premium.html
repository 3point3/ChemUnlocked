    <div class="unit-label" id="unitLabel">Introductory General Chemistry &nbsp;&middot;&nbsp; Premium Practice</div>

    <a href="#main-content" class="btn btn-outline">Back to Top</a>

  </div>

<script src="chem.js?v=20260509"></script>
<script src="practice-premium.js"></script>
<script type="module">
import { renderPremiumProblemSet } from './netlify/lib/premium-practice-engine.js';

const UNIT_CONFIG = {
  '01': { title: 'Intro to Chemistry & Lab Safety', problemCount: 125 },
  '02': { title: 'Classification of Matter', problemCount: 86 },
  '03': { title: 'Atomic Structure', problemCount: 84 },
  '04': { title: 'Electron Configuration', problemCount: 81 },
  '05': { title: 'Periodic Table & Trends', problemCount: 84 },
  '06': { title: 'Chemical Nomenclature', problemCount: 81 },
  '07': { title: 'The Mole', problemCount: 81 },
  '08': { title: 'Chemical Reactions', problemCount: 81 },
  '09': { title: 'Stoichiometry', problemCount: 81 },
  '10': { title: 'Chemical Bonding', problemCount: 81 },
  '11': { title: 'Energy & Thermochemistry', problemCount: 84 },
  '12': { title: 'Gas Laws', problemCount: 84 },
  '13': { title: 'Solutions', problemCount: 82 },
  '14': { title: 'Chemical Equilibrium', problemCount: 81 },
  '15': { title: 'Acids & Bases', problemCount: 81 }
};

const params = new URLSearchParams(window.location.search);
const requestedUnit = (params.get('unit') || '').trim();
const normalizedUnit = /^\d{1,2}$/.test(requestedUnit)
  ? requestedUnit.padStart(2, '0')
  : '';
const unit = UNIT_CONFIG[normalizedUnit] ? normalizedUnit : '';

if (!unit) {
  window.location.replace('practice.html');
} else {
  const filterSelect = document.getElementById('filterSelect');
  const reloadBtn = document.getElementById('reloadBtn');
  const billingBtn = document.getElementById('billingBtn');
  const problemContainer = document.getElementById('problemContainer');
  const unitLabel = document.getElementById('unitLabel');
  const unitTitle = document.getElementById('unitTitle');
  const unitSubtitle = document.getElementById('unitSubtitle');
  const teaserLink = document.getElementById('teaserLink');
  const scrollHint = document.getElementById('scrollHint');
  const loadPremiumSet = window.loadPremiumSet;
  const openCustomerPortal = window.openCustomerPortal;
  const unitMeta = UNIT_CONFIG[unit];

  unitLabel.textContent = `Introductory General Chemistry · Unit ${unit} Premium Practice`;
  unitTitle.textContent = unitMeta.title;
  unitSubtitle.textContent = `Bite-sized practice: 3 randomized problems at a time from the ${unitMeta.problemCount}-problem Unit ${unit} bank. Generate thousands of unique review sets with instant feedback and full worked solutions.`;
  teaserLink.href = `${unit}_practice.html`;
  scrollHint.textContent = `Introductory General Chemistry · Unit ${unit} · ${unitMeta.title} Premium Practice`;
  document.title = `ChemUnlocked Unit ${unit} Premium Practice`;

  async function checkAccess() {
    const token = localStorage.getItem('cu_token') || '';
    if (!token) {
      redirectToGate('no_token');
      return false;
    }

    try {
      const res = await fetch(
        `/.netlify/functions/get-premium-problem-set?unit=${encodeURIComponent(unit)}&count=1`,
        { headers: { 'x-access-token': token } }
      );
      if (res.status === 403) {
        localStorage.removeItem('cu_token');
        redirectToGate('expired');
        return false;
      }
      if (!res.ok) {
        throw new Error('Subscription check failed.');
      }
      return true;
    } catch (err) {
      problemContainer.innerHTML = `<p class="premium-status premium-status--error">Could not verify subscription: ${err.message}</p>`;
      return false;
    }
  }

  function redirectToGate(reason) {
    window.location.replace(`${unit}_practice.html?access=${encodeURIComponent(reason)}`);
  }

  async function loadSet() {
    problemContainer.innerHTML = '<p class="premium-status premium-status--muted">Loading your problem set...</p>';
    try {
      const data = await loadPremiumSet(unit, filterSelect.value, 3);
      renderPremiumProblemSet({ problems: data.problems, containerId: 'problemContainer' });
    } catch (err) {
      problemContainer.innerHTML = `<p class="premium-status premium-status--error">Could not load problems: ${err.message}</p>`;
    }
  }

  reloadBtn.addEventListener('click', () => { loadSet(); });
  filterSelect.addEventListener('change', () => { loadSet(); });
  billingBtn.addEventListener('click', () => {
    if (typeof openCustomerPortal === 'function') {
      openCustomerPortal();
    } else {
      alert('Billing portal is not available in this local test yet.');
    }
  });

  problemContainer.innerHTML = '<p class="premium-status premium-status--muted">Verifying subscription...</p>';
  checkAccess().then(ok => { if (ok) loadSet(); });
}
</script>
</body>
