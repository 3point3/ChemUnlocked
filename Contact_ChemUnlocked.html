<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="starfield"></div>

  <main id="main-content">
    <div class="container">
      <section class="contact-wrap">
        <div class="contact-card">
          <h1>Contact ChemUnlocked</h1>
          <p>Have a question, suggestion, or partnership idea? Send a message below.</p>

          <form
            id="contactForm"
            class="contact-form"
            action="https://formspree.io/f/xdayojvj"
            method="POST"
            novalidate
          >
            <div class="form-row">
              <label for="name">Your name</label>
              <input id="name" name="name" type="text" autocomplete="name" required>
            </div>

            <div class="form-row">
              <label for="email">Your email</label>
              <input id="email" name="email" type="email" autocomplete="email" required>
            </div>

            <div class="form-row">
              <label for="message">Message</label>
              <textarea id="message" name="message" required></textarea>
            </div>

            <div class="hp-field" aria-hidden="true">
              <label for="company">Leave this field empty</label>
              <input id="company" name="company" type="text" tabindex="-1" autocomplete="off">
            </div>

            <input type="hidden" name="_subject" value="New ChemUnlocked Contact Form Message">
            <input type="hidden" name="_gotcha_time" id="gotchaTime" value="">

            <p class="form-note">Please do not submit links unrelated to chemistry learning or education.</p>

            <button type="submit" class="contact-btn" id="submitBtn">Send Message</button>

            <div id="formStatus" class="status-box" role="status" aria-live="polite" tabindex="-1"></div>
          </form>
        </div>
      </section>
    </div>
  </main>
