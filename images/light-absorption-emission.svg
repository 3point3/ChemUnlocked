<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 220" role="img" aria-labelledby="title desc">
  <title id="title">Absorption and emission of light</title>
  <desc id="desc">Side-by-side energy level diagrams for absorption and emission with labeled n=1 and n=2 levels.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#94a3b8" flood-opacity="0.22"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#b91c1c"/>
    </marker>
  </defs>

  <rect width="280" height="220" rx="28" fill="url(#bgGrad)"/>
  <g filter="url(#softShadow)">
    <rect x="10" y="10" width="260" height="200" rx="24" fill="url(#panelGrad)" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="24" y="46" width="104" height="148" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.25"/>
    <rect x="152" y="46" width="104" height="148" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.25"/>
  </g>

  <!-- Panel titles -->
  <text x="76" y="64" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#1d4ed8">Absorption</text>
  <text x="204" y="64" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#b91c1c">Emission</text>

  <!-- ══ ABSORPTION ══ -->

  <!-- Energy level lines -->
  <line x1="46" y1="96"  x2="106" y2="96"  stroke="#94a3b8" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="46" y1="152" x2="106" y2="152" stroke="#94a3b8" stroke-width="1.9" stroke-linecap="round"/>

  <!-- n= labels above each line, left of the transition arrow -->
  <text x="48" y="91"  font-family="Arial, Helvetica, sans-serif" font-size="9" font-style="italic" fill="#64748b">n=2</text>
  <text x="48" y="163" font-family="Arial, Helvetica, sans-serif" font-size="9" font-style="italic" fill="#64748b">n=1</text>

  <!-- Electrons: solid = starting position, ghost = destination -->
  <circle cx="74" cy="152" r="4.1" fill="#22c55e" stroke="#047857" stroke-width="0.9"/>
  <circle cx="74" cy="96"  r="4.1" fill="#22c55e" stroke="#047857" stroke-width="0.9" opacity="0.22"/>

  <!-- Upward transition arrow -->
  <line x1="74" y1="144" x2="74" y2="104" stroke="#1d4ed8" stroke-width="1.9" stroke-dasharray="4 4" marker-end="url(#arrowBlue)"/>

  <!-- Incoming photon wave arriving AT the n=1 level (y=152) where the electron sits -->
  <path d="M28 152 C32 147 36 157 40 152 S48 147 52 152 S60 157 62 152"
        fill="none" stroke="#1d4ed8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="62" y1="152" x2="68" y2="152" stroke="#1d4ed8" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- ══ EMISSION ══ -->

  <!-- Energy level lines -->
  <line x1="174" y1="96"  x2="234" y2="96"  stroke="#94a3b8" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="174" y1="152" x2="234" y2="152" stroke="#94a3b8" stroke-width="1.9" stroke-linecap="round"/>

  <!-- n= labels -->
  <text x="176" y="91"  font-family="Arial, Helvetica, sans-serif" font-size="9" font-style="italic" fill="#64748b">n=2</text>
  <text x="176" y="163" font-family="Arial, Helvetica, sans-serif" font-size="9" font-style="italic" fill="#64748b">n=1</text>

  <!-- Electrons: solid at n=2 (before drop), ghost at n=1 (after) -->
  <circle cx="196" cy="96"  r="4.1" fill="#22c55e" stroke="#047857" stroke-width="0.9"/>
  <circle cx="196" cy="152" r="4.1" fill="#22c55e" stroke="#047857" stroke-width="0.9" opacity="0.22"/>

  <!-- Downward transition arrow -->
  <line x1="196" y1="104" x2="196" y2="144" stroke="#b91c1c" stroke-width="1.9" stroke-dasharray="4 4" marker-end="url(#arrowRed)"/>

  <!-- Outgoing photon wave departing FROM the n=2 level (y=96) where the electron was -->
  <path d="M204 96 C208 91 212 101 216 96 S224 91 230 96 S238 101 242 96"
        fill="none" stroke="#b91c1c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="242" y1="96" x2="248" y2="96" stroke="#b91c1c" stroke-width="1.5" marker-end="url(#arrowRed)"/>
</svg>
