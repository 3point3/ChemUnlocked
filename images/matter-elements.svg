<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" role="img" aria-labelledby="title desc">
  <title id="title">Element particle diagrams</title>
  <desc id="desc">Examples of monatomic, diatomic, and solid elements using only one atom type in each panel.</desc>
