<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-labelledby="title desc">
  <title id="title">Bohr model versus quantum mechanical model</title>
  <desc id="desc">A side-by-side comparison shows fixed circular energy levels in the Bohr model and fuzzy probability clouds in the quantum model.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="bohrPanel" x1="0" x2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="quantumPanel" x1="0" x2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <radialGradient id="cloudBlue" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.24"/>
      <stop offset="60%" stop-color="#1d4ed8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.02"/>
    </radialGradient>
    <radialGradient id="cloudTeal" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#047857" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#047857" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#047857" stop-opacity="0.01"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#94a3b8" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="480" rx="32" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="54" y="44" width="506" height="332" rx="28" fill="url(#bohrPanel)" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="640" y="44" width="506" height="332" rx="28" fill="url(#quantumPanel)" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>

  <g>
    <circle cx="308" cy="210" r="16" fill="#b91c1c"/>
    <circle cx="308" cy="210" r="60" fill="none" stroke="#60a5fa" stroke-width="2.5"/>
    <circle cx="308" cy="210" r="98" fill="none" stroke="#93c5fd" stroke-width="2.5"/>
    <circle cx="308" cy="210" r="134" fill="none" stroke="#bfdbfe" stroke-width="2.5"/>
    <circle cx="368" cy="210" r="9" fill="#1d4ed8"/>
    <circle cx="308" cy="112" r="9" fill="#1d4ed8"/>
    <circle cx="308" cy="344" r="9" fill="#1d4ed8"/>
    <path d="M354 176c18 -20 33 -41 45 -70" fill="none" />

    <circle cx="894" cy="210" r="16" fill="#b91c1c"/>
    <ellipse cx="894" cy="210" rx="178" ry="126" fill="url(#cloudBlue)"/>
    <ellipse cx="894" cy="210" rx="116" ry="176" fill="url(#cloudTeal)"/>
    <ellipse cx="894" cy="210" rx="84" ry="84" fill="#1d4ed8" fill-opacity="0.08"/>
    <path d="M736 210c48 -54 104 -82 158 -82" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 8"/>
    <path d="M940 350c52 -14 92 -50 112 -96" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 8"/>
  </g>
</svg>
