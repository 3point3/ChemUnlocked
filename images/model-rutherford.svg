<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 220" role="img" aria-labelledby="title desc">
  <title id="title">Rutherford atomic model</title>
  <desc id="desc">A small positive nucleus deflects a few incoming alpha particles while most pass through empty space.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <radialGradient id="field" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.26"/>
      <stop offset="65%" stop-color="#1d4ed8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#94a3b8" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="280" height="220" rx="28" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="14" y="14" width="252" height="192" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>
  <circle cx="140" cy="110" r="80" fill="url(#field)"/>
  <circle cx="140" cy="110" r="14" fill="#1d4ed8"/>
  <circle cx="140" cy="110" r="14" fill="none" stroke="#0f172a" stroke-opacity="0.06" stroke-width="1"/>
  <rect x="131" y="108.4" width="18" height="3.2" rx="1.6" fill="#ffffff"/>
  <rect x="138.4" y="101" width="3.2" height="18" rx="1.6" fill="#ffffff"/>
</svg>
