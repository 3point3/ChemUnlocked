<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">ChemUnlocked SVG style template</title>
  <desc id="desc">A reusable template showing the preferred visual style for instructional ChemUnlocked diagrams.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#94a3b8" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="760" height="420" rx="28" fill="url(#bgGrad)"/>

  <text x="380" y="40" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#0f172a">
    Diagram Title
  </text>

  <g filter="url(#softShadow)">
    <rect x="32" y="96" width="330" height="286" rx="24" fill="url(#panelGrad)" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="398" y="96" width="330" height="286" rx="24" fill="url(#panelGrad)" stroke="#cbd5e1" stroke-width="2"/>
  </g>

  <text x="197" y="130" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#1d4ed8">
    Group Heading
  </text>
  <text x="563" y="130" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#1d4ed8">
    Group Heading
  </text>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="58" y="152" width="278" height="62" rx="16" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
    <text x="80" y="187" font-size="24" font-weight="700" fill="#1d4ed8">Primary label</text>

    <rect x="58" y="228" width="132" height="88" rx="16" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
    <text x="124" y="258" text-anchor="middle" font-size="22" font-weight="700" fill="#047857">Green</text>
    <text x="124" y="280" text-anchor="middle" font-size="14" fill="#334155">sublevel</text>

    <rect x="204" y="228" width="132" height="88" rx="16" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
    <text x="270" y="258" text-anchor="middle" font-size="22" font-weight="700" fill="#b91c1c">Red</text>
    <text x="270" y="280" text-anchor="middle" font-size="14" fill="#334155">energy</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif">
    <circle cx="478" cy="190" r="42" fill="#fde68a" stroke="#d97706" stroke-width="2.5"/>
    <circle cx="478" cy="190" r="8" fill="#1e293b"/>
    <text x="478" y="252" text-anchor="middle" font-size="18" font-weight="700" fill="#d97706">Simple focal shape</text>

    <path d="M572 152 L640 190 L572 228" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="606" y="252" text-anchor="middle" font-size="18" font-weight="700" fill="#7c3aed">Clean accent line</text>

    <rect x="430" y="284" width="266" height="56" rx="14" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <text x="563" y="327" text-anchor="middle" font-size="20" font-weight="700" fill="#b91c1c">ΔE = hν</text>
  </g>
</svg>
