<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 220" role="img" aria-labelledby="title desc">
  <title id="title">Thomson atomic model</title>
  <desc id="desc">A positive sphere contains embedded electrons in the Thomson model.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <radialGradient id="sphere" cx="42%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#f5e1b9"/>
      <stop offset="100%" stop-color="#d6a35d"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#94a3b8" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="280" height="220" rx="28" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="14" y="14" width="252" height="192" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>
  <circle cx="140" cy="110" r="68" fill="url(#sphere)" stroke="#b45309" stroke-width="1.6"/>
  <g fill="#fff7e6" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="middle" opacity="0.9">
    <text x="116" y="58">+</text>
    <text x="164" y="58">+</text>
    <text x="141" y="84">+</text>
    <text x="78" y="110">+</text>
    <text x="202" y="112">+</text>
    <text x="143" y="148">+</text>
    <text x="104" y="178">+</text>
    <text x="180" y="170">+</text>
  </g>
  <g fill="#1d4ed8">
    <circle cx="93" cy="74" r="11"/>
    <circle cx="192" cy="70" r="11"/>
    <circle cx="133" cy="118" r="11"/>
    <circle cx="186" cy="160" r="11"/>
    <circle cx="102" cy="168" r="11"/>
  </g>
  <g fill="#ffffff" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="middle">
    <text x="93" y="80">−</text>
    <text x="192" y="76">−</text>
    <text x="133" y="124">−</text>
    <text x="186" y="166">−</text>
    <text x="102" y="174">−</text>
  </g>
</svg>
