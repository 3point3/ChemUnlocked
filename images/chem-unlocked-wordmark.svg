<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" role="img" aria-labelledby="title desc">
  <title id="title">ChemUnlocked logo</title>
  <desc id="desc">ChemUnlocked wordmark with a chemistry-inspired monogram icon.</desc>
  <defs>
    <linearGradient id="badgeFill" x1="24" y1="20" x2="156" y2="156" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="strokeFill" x1="42" y1="35" x2="136" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="accentFill" x1="32" y1="34" x2="132" y2="136" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect x="16" y="16" width="144" height="144" rx="36" fill="url(#badgeFill)" filter="url(#shadow)"/>
  <rect x="21" y="21" width="134" height="134" rx="31" fill="none" stroke="#67e8f9" stroke-opacity="0.18" stroke-width="3"/>

  <path d="M68 48c-13 0-26 10-31 25-5 16-1 38 13 51 13 13 36 17 53 10" fill="none" stroke="url(#strokeFill)" stroke-linecap="round" stroke-width="15"/>
  <path d="M108 50v47c0 17 11 28 27 28 14 0 25-9 31-18" fill="none" stroke="url(#strokeFill)" stroke-linecap="round" stroke-linejoin="round" stroke-width="15"/>
  <path d="M38 111c10-9 25-13 39-12 14 2 28 8 38 18" fill="none" stroke="url(#accentFill)" stroke-linecap="round" stroke-width="7"/>
  <path d="M115 115c12-2 21-8 28-17" fill="none" stroke="url(#accentFill)" stroke-linecap="round" stroke-width="7"/>

  <circle cx="37" cy="111" r="10" fill="#fef08a"/>
  <circle cx="116" cy="115" r="8.5" fill="#67e8f9"/>
  <circle cx="142" cy="98" r="10" fill="#14b8a6"/>
  <circle cx="123" cy="41" r="6" fill="#f8fafc" fill-opacity="0.88"/>

  <g fill="#0f172a">
    <text x="194" y="98" font-size="68" font-weight="800" font-family="'Trebuchet MS', 'Avenir Next', 'Segoe UI', sans-serif" letter-spacing="-2.4">Chem</text>
    <text x="359" y="98" font-size="68" font-weight="620" font-style="italic" font-family="'Trebuchet MS', 'Avenir Next', 'Segoe UI', sans-serif" letter-spacing="-2">Unlocked</text>
  </g>
  <text x="195" y="129" font-size="19" font-weight="600" fill="#0f766e" font-family="'Trebuchet MS', 'Avenir Next', 'Segoe UI', sans-serif" letter-spacing="3.5">STUDY SMARTER. PRACTICE HARDER.</text>
</svg>
