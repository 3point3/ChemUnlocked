<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 180" role="img" aria-labelledby="title desc">
  <title id="title">Ionic compound diagram</title>
  <desc id="desc">A container showing identical bonded pairs of atoms — one purple and one teal — repeated throughout, each pair in a fixed 1-to-1 ratio.</desc>
  <rect x="18" y="18" width="324" height="144" rx="20" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="3"/>
  <!-- Pair 1: Na(55,68) Cl(85,68) -->
  <line x1="55" y1="68" x2="85" y2="68" stroke="#475569" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="55" cy="68" r="15" fill="#818cf8" stroke="#4f46e5" stroke-width="2"/>
  <circle cx="85" cy="68" r="15" fill="#34d399" stroke="#059669" stroke-width="2"/>
  <!-- Pair 2: Na(195,52) Cl(225,52) -->
  <line x1="195" y1="52" x2="225" y2="52" stroke="#475569" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="195" cy="52" r="15" fill="#818cf8" stroke="#4f46e5" stroke-width="2"/>
  <circle cx="225" cy="52" r="15" fill="#34d399" stroke="#059669" stroke-width="2"/>
  <!-- Pair 3: Na(115,128) Cl(145,128) -->
  <line x1="115" y1="128" x2="145" y2="128" stroke="#475569" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="115" cy="128" r="15" fill="#818cf8" stroke="#4f46e5" stroke-width="2"/>
  <circle cx="145" cy="128" r="15" fill="#34d399" stroke="#059669" stroke-width="2"/>
  <!-- Pair 4: Na(270,118) Cl(300,118) -->
  <line x1="270" y1="118" x2="300" y2="118" stroke="#475569" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="270" cy="118" r="15" fill="#818cf8" stroke="#4f46e5" stroke-width="2"/>
  <circle cx="300" cy="118" r="15" fill="#34d399" stroke="#059669" stroke-width="2"/>
</svg>
