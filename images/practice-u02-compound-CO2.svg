<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 180" role="img" aria-labelledby="title desc">
  <title id="title">Linear triatomic compound diagram</title>
  <desc id="desc">A container showing identical linear three-atom molecules, each with a large dark center atom bonded to two smaller red atoms on either side.</desc>
  <rect x="18" y="18" width="324" height="144" rx="20" fill="#f8fafc" stroke="#94a3b8" stroke-width="3"/>
  <!-- Molecule 1: O(78,60) C(110,60) O(142,60) -->
  <line x1="78"  y1="60" x2="142" y2="60" stroke="#64748b" stroke-width="2.5"/>
  <circle cx="78"  cy="60" r="14" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <circle cx="110" cy="60" r="18" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
  <circle cx="142" cy="60" r="14" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <!-- Molecule 2: O(226,55) C(258,55) O(290,55) -->
  <line x1="226" y1="55" x2="290" y2="55" stroke="#64748b" stroke-width="2.5"/>
  <circle cx="226" cy="55" r="14" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <circle cx="258" cy="55" r="18" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
  <circle cx="290" cy="55" r="14" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <!-- Molecule 3: O(143,128) C(175,128) O(207,128) -->
  <line x1="143" y1="128" x2="207" y2="128" stroke="#64748b" stroke-width="2.5"/>
  <circle cx="143" cy="128" r="14" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <circle cx="175" cy="128" r="18" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
  <circle cx="207" cy="128" r="14" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
</svg>
