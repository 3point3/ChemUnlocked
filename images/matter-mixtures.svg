  <text x="70" y="18" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#166534">Homogeneous (N2 + Ar)</text>
  <circle cx="20" cy="42" r="11" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
  <circle cx="40" cy="42" r="11" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
