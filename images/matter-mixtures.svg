  <circle cx="115" cy="82" r="14" fill="#f97316" stroke="#c2410c" stroke-width="1.5"/>
  <rect x="145" y="5" width="130" height="110" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="2"/>
  <text x="210" y="18" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#92400e">Heterogeneous (layered)</text>
  <line x1="145" y1="58" x2="275" y2="58" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="165" cy="35" r="11" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
