<svg width="100%" height="auto" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Synthesis reaction particle model</title>
  <desc id="desc">Sodium combines with chlorine gas to form sodium chloride in a synthesis reaction particle model.</desc>
  <defs>
    <radialGradient id="sodium-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="60%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <radialGradient id="chlorine-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="60%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </radialGradient>
    <style>
      .bg-panel { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5px; rx: 16px; }
      .header-text { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #64748b; letter-spacing: 0.1em; }
      .atom-label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 800; text-anchor: middle; dominant-baseline: central; }
      .na-label, .cl-label { fill: #ffffff; }
      .math-symbol { font-family: system-ui, -apple-system, sans-serif; font-size: 28px; font-weight: 500; fill: #94a3b8; text-anchor: middle; dominant-baseline: central; }
      .formula-text { font-family: system-ui, -apple-system, sans-serif; font-size: 26px; font-weight: 700; fill: #0f172a; text-anchor: middle; }
      .coeff { fill: #2563eb; font-weight: 800; }
      .subscript { font-size: 16px; baseline-shift: sub; fill: #475569; }
      .state-symbol { font-size: 16px; fill: #64748b; font-weight: 500; }
      .divider { stroke: #f1f5f9; stroke-width: 2px; stroke-dasharray: 4 4; }
    </style>
  </defs>

  <rect class="bg-panel" x="10" y="10" width="880" height="400" />
  <text x="450" y="36" class="header-text" text-anchor="middle">PARTICLE LEVEL REACTION MODEL</text>
  <line x1="40" y1="255" x2="860" y2="255" class="divider" />

  <g transform="translate(180, 140)">
    <circle cx="0" cy="0" r="24" fill="url(#sodium-grad)" stroke="#1d4ed8" stroke-width="1.2" />
    <text x="0" y="0" class="atom-label na-label">Na</text>
  </g>

  <text x="310" y="140" class="math-symbol">+</text>

  <g transform="translate(430, 140)">
    <circle cx="-19" cy="0" r="24" fill="url(#chlorine-grad)" stroke="#15803d" stroke-width="1.2" />
    <text x="-19" y="0" class="atom-label cl-label">Cl</text>
    <circle cx="19" cy="0" r="24" fill="url(#chlorine-grad)" stroke="#15803d" stroke-width="1.2" />
    <text x="19" y="0" class="atom-label cl-label">Cl</text>
  </g>

  <g transform="translate(550, 140)">
    <path d="M -20,0 L 20,0 M 8,-8 L 21,0 L 8,8" fill="none" stroke="#475569" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <g transform="translate(710, 140)">
    <g transform="translate(0, -45)">
      <circle cx="-20" cy="0" r="24" fill="url(#sodium-grad)" stroke="#1d4ed8" stroke-width="1.2" />
      <text x="-20" y="0" class="atom-label na-label">Na</text>
      <circle cx="20" cy="0" r="24" fill="url(#chlorine-grad)" stroke="#15803d" stroke-width="1.2" />
      <text x="20" y="0" class="atom-label cl-label">Cl</text>
    </g>
    <g transform="translate(0, 45)">
      <circle cx="-20" cy="0" r="24" fill="url(#sodium-grad)" stroke="#1d4ed8" stroke-width="1.2" />
      <text x="-20" y="0" class="atom-label na-label">Na</text>
      <circle cx="20" cy="0" r="24" fill="url(#chlorine-grad)" stroke="#15803d" stroke-width="1.2" />
      <text x="20" y="0" class="atom-label cl-label">Cl</text>
    </g>
  </g>

  <g transform="translate(0, 300)">
    <text x="180" y="0" class="formula-text">Na <tspan class="state-symbol">(s)</tspan></text>
    <text x="310" y="-4" class="math-symbol" font-size="24">+</text>
    <text x="430" y="0" class="formula-text">Cl<tspan class="subscript">2</tspan> <tspan class="state-symbol">(g)</tspan></text>
    <text x="550" y="-4" class="math-symbol" font-size="24">→</text>
    <text x="710" y="0" class="formula-text"><tspan class="coeff">2</tspan>NaCl <tspan class="state-symbol">(s)</tspan></text>
  </g>

</svg>
