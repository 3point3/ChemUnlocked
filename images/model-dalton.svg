<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 220" role="img" aria-labelledby="title desc">
  <title id="title">Dalton atomic model</title>
  <desc id="desc">A single solid sphere represents Dalton's atomic model.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <radialGradient id="sphere" cx="40%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#f5d98c"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <pattern id="grain" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="8" r="1.4" fill="#ffffff" opacity="0.14"/>
      <circle cx="18" cy="12" r="1.2" fill="#7c5a1b" opacity="0.08"/>
      <circle cx="11" cy="19" r="1.1" fill="#fff7df" opacity="0.14"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#94a3b8" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="280" height="220" rx="28" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="14" y="14" width="252" height="192" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>
  <circle cx="140" cy="110" r="68" fill="url(#sphere)" stroke="#b45309" stroke-width="1.6"/>
  <circle cx="140" cy="110" r="68" fill="url(#grain)"/>
</svg>
