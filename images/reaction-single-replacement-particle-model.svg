<svg width="100%" height="auto" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Single replacement reaction particle model</title>
  <desc id="desc">Potassium replaces aluminum in aluminum chloride to form potassium chloride and elemental aluminum.</desc>
  <defs>
    <radialGradient id="potassium-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="60%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7e22ce"/>
    </radialGradient>
    <radialGradient id="aluminum-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="60%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </radialGradient>
    <radialGradient id="chlorine-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="60%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </radialGradient>
    <style>
      .bg-panel { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5px; rx: 16px; }
      .header-text { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #64748b; letter-spacing: 0.1em; }
      .atom-label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 800; text-anchor: middle; dominant-baseline: central; }
      .k-label, .cl-label { fill: #ffffff; }
      .al-label { fill: #334155; }
      .math-symbol { font-family: system-ui, -apple-system, sans-serif; font-size: 28px; font-weight: 500; fill: #94a3b8; text-anchor: middle; dominant-baseline: central; }
      .formula-text { font-family: system-ui, -apple-system, sans-serif; font-size: 26px; font-weight: 700; fill: #0f172a; text-anchor: middle; }
      .coeff { fill: #2563eb; font-weight: 800; }
      .subscript { font-size: 16px; baseline-shift: sub; fill: #475569; }
      .state-symbol { font-size: 16px; fill: #64748b; font-weight: 500; }
      .divider { stroke: #f1f5f9; stroke-width: 2px; stroke-dasharray: 4 4; }
    </style>
  </defs>

  <rect class="bg-panel" x="10" y="10" width="880" height="400" />
  <text x="450" y="36" class="header-text" text-anchor="middle">PARTICLE LEVEL REACTION MODEL</text>
  <line x1="40" y1="255" x2="860" y2="255" class="divider" />

  <g transform="translate(140, 140)">
    <circle cx="0" cy="-50" r="24" fill="url(#potassium-grad)" stroke="#6b21a8" stroke-width="1.2" />
    <text x="0" y="-50" class="atom-label k-label">K</text>
    <circle cx="0" cy="0" r="24" fill="url(#potassium-grad)" stroke="#6b21a8" stroke-width="1.2" />
    <text x="0" y="0" class="atom-label k-label">K</text>
    <circle cx="0" cy="50" r="24" fill="url(#potassium-grad)" stroke="#6b21a8" stroke-width="1.2" />
    <text x="0" y="50" class="atom-label k-label">K</text>
  </g>

  <text x="250" y="140" class="math-symbol">+</text>

  <g transform="translate(370, 140)">
    <circle cx="0" cy="0" r="24" fill="url(#aluminum-grad)" stroke="#475569" stroke-width="1.2" />
    <text x="0" y="0" class="atom-label al-label">Al</text>
    <circle cx="0" cy="-38" r="24" fill="url(#chlorine-grad)" stroke="#166534" stroke-width="1.2" />
    <text x="0" y="-38" class="atom-label cl-label">Cl</text>
    <circle cx="-33" cy="19" r="24" fill="url(#chlorine-grad)" stroke="#166534" stroke-width="1.2" />
    <text x="-33" y="19" class="atom-label cl-label">Cl</text>
    <circle cx="33" cy="19" r="24" fill="url(#chlorine-grad)" stroke="#166534" stroke-width="1.2" />
    <text x="33" y="19" class="atom-label cl-label">Cl</text>
  </g>

  <g transform="translate(490, 140)">
    <path d="M -20,0 L 20,0 M 8,-8 L 21,0 L 8,8" fill="none" stroke="#475569" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <g transform="translate(620, 140)">
    <g transform="translate(0, -50)">
      <circle cx="-20" cy="0" r="24" fill="url(#potassium-grad)" stroke="#6b21a8" stroke-width="1.2" />
      <text x="-20" y="0" class="atom-label k-label">K</text>
      <circle cx="20" cy="0" r="24" fill="url(#chlorine-grad)" stroke="#166534" stroke-width="1.2" />
      <text x="20" y="0" class="atom-label cl-label">Cl</text>
    </g>
    <g transform="translate(0, 0)">
      <circle cx="-20" cy="0" r="24" fill="url(#potassium-grad)" stroke="#6b21a8" stroke-width="1.2" />
      <text x="-20" y="0" class="atom-label k-label">K</text>
      <circle cx="20" cy="0" r="24" fill="url(#chlorine-grad)" stroke="#166534" stroke-width="1.2" />
      <text x="20" y="0" class="atom-label cl-label">Cl</text>
    </g>
    <g transform="translate(0, 50)">
      <circle cx="-20" cy="0" r="24" fill="url(#potassium-grad)" stroke="#6b21a8" stroke-width="1.2" />
      <text x="-20" y="0" class="atom-label k-label">K</text>
      <circle cx="20" cy="0" r="24" fill="url(#chlorine-grad)" stroke="#166534" stroke-width="1.2" />
      <text x="20" y="0" class="atom-label cl-label">Cl</text>
    </g>
  </g>

  <text x="730" y="140" class="math-symbol">+</text>

  <g transform="translate(810, 140)">
    <circle cx="0" cy="0" r="24" fill="url(#aluminum-grad)" stroke="#475569" stroke-width="1.2" />
    <text x="0" y="0" class="atom-label al-label">Al</text>
  </g>

  <g transform="translate(0, 300)">
    <text x="140" y="0" class="formula-text"><tspan class="coeff">3</tspan>K <tspan class="state-symbol">(s)</tspan></text>
    <text x="250" y="-4" class="math-symbol" font-size="24">+</text>
    <text x="370" y="0" class="formula-text">AlCl<tspan class="subscript">3</tspan> <tspan class="state-symbol">(s)</tspan></text>
    <text x="490" y="-4" class="math-symbol" font-size="24">→</text>
    <text x="620" y="0" class="formula-text"><tspan class="coeff">3</tspan>KCl <tspan class="state-symbol">(s)</tspan></text>
    <text x="730" y="-4" class="math-symbol" font-size="24">+</text>
    <text x="810" y="0" class="formula-text">Al <tspan class="state-symbol">(s)</tspan></text>
  </g>

</svg>
