<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" role="img" aria-label="Nitrate ion resonance structures">
  <defs>
    <style>
      .bond { stroke: #0b6f63; stroke-width: 4.5; stroke-linecap: round; opacity: 0.82; }
      .thin { stroke-width: 2.4; }
      .atom { fill: #0b6f63; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 28px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; opacity: 0.92; }
      .charge { fill: #0b6f63; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 18px; font-weight: 700; text-anchor: middle; opacity: 0.72; }
      .pair { fill: #0f8a7a; opacity: 0.58; }
      .bracket { fill: none; stroke: #0b6f63; stroke-width: 2.4; stroke-linecap: round; opacity: 0.34; }
      .arrow { fill: none; stroke: #0b6f63; stroke-width: 2.7; stroke-linecap: round; stroke-linejoin: round; opacity: 0.48; }
    </style>
  </defs>

